<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedling | My Learning Garden</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&family=Caveat&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="welcome-screen" class="active">
        <div class="vintage-frame sprout-gate">
            <h1 class="logo-title">Seedling</h1>
            <p class="objective-text">
                Reach higher with structured growth! We believe independent learning should be as natural as planting a garden.
            </p>
            <button class="welcome-btn gold-seedling-pin" onclick="enterGarden()">
                Welcome <span class="sprout-icon">🌱</span>
            </button>
        </div>
    </section>

  <div id="app-shell" style="display:none;">
    <div class="trail-path-bg"></div>

    <aside class="sidebar-vine">
        <div class="logo">🌱</div>
        <nav>
            <button onclick="showPage('kanban-page')" title="The Drawing Board">🏡</button>
            <button onclick="showPage('lesson-page')" title="The Grove">📖</button>
            <button onclick="showPage('quiz-page')" title="Harvest Quiz">🍎</button>
        </nav>
        <div id="rank-badge" style="font-weight: bold; color: var(--egyptian-earth); margin-top: auto; padding-bottom: 20px;">Novice Sprout</div>
    </aside>

    <main class="content-area">
        <div class="crystal-paper-box">
            
            <section id="kanban-page" class="page newspaper-page">
                <header class="news-head"><h2>Garden Layout: The Drawing Board</h2></header>
                <div class="kanban-header">
                    <input type="text" id="new-subject" placeholder="New subject name...">
                    <button onclick="plantSeed()">Plant Seed</button>
                </div>
                <div class="garden-board">
                    <div class="col" id="todo"><h3>The Packet</h3><div class="zone"></div></div>
                    <div class="col" id="doing"><h3>Sprouting</h3><div class="zone"></div></div>
                    <div class="col" id="done"><h3>Blooming</h3><div class="zone"></div></div>
                </div>
            </section>

            <section id="lesson-page" class="page newspaper-page">
                <header class="news-head"><h2>Seedling: The Grove Edition</h2></header>
                <div class="deck-selector">
                    <button class="vintage-btn" onclick="switchDeck('Life Insurance')">Life Insurance</button>
                    <button class="vintage-btn" onclick="switchDeck('Taxes')">Taxes</button>
                    <button class="vintage-btn" onclick="switchDeck('Stock Market')">Stocks</button>
                </div>
                
                <div class="lesson-grid">
                    <article class="main-news">
                        <div class="progress-container"><div id="progress-vine" class="vine-bar"></div></div>
                        <h1 id="lesson-title" class="news-headline">Select a Subject</h1>
                        <div id="media-container" class="newspaper-photo"></div>
                        <div id="lesson-text" class="news-copy"></div>
                    </article>

                    <aside class="parody-ads-column">
                        <div class="parody-ad field-notes-ad">
                            <h4>Field Notes</h4>
                            <textarea id="field-notes" placeholder="Write your thoughts..."></textarea>
                        </div>
                        <div class="parody-ad ask-pip-ad">
                            <h4>Ask Pip</h4>
                            <div id="chat-display"></div>
                            <div class="chat-input">
                                <input type="text" id="pip-input" placeholder="Ask Pip...">
                                <button onclick="askPip()">➔</button>
                            </div>
                        </div>
                        <button class="journey-btn" onclick="nextLesson()">Next Lesson ➔</button>
                    </aside>
                </div>
            </section>

            <section id="quiz-page" class="page newspaper-page">
                <header class="news-head"><h2>Harvest Time</h2></header>
                <div id="quiz-choice-screen">
                    <button class="journey-btn" onclick="startHarvest()">Start Quiz</button>
                </div>
                <div id="quiz-mode" style="display:none;">
                    <h3 id="quiz-question"></h3>
                    <div id="quiz-options"></div>
                </div>
            </section>

        </div>
    </main>
</div>

            </div>
        </main>
    </div>

    <script src="education-concept.js"></script>
</body>
</html>
